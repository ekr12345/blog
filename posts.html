---
layout: default
title: Posts
permalink: /posts/
---

<ul class="posts-list" style="list-style: none; padding: 0; margin: 0;">
  {% for post in site.posts %}
    <li style="margin-bottom: 0.3rem;">
      <a href="{{ post.url }}" style="font-family: 'Dreamcast', sans-serif; font-size: 1.6rem; color: #e8560a; text-decoration: none;">{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>
