---
layout: default
title: 日本語ブログ
permalink: /jp/
---

<ul class="posts-list" style="list-style: none; padding: 0; margin: 0;">
  {% assign jp_posts = site.jp | sort: "date" | reverse %}
  {% for post in jp_posts %}
    <li style="margin-bottom: 0.3rem;">
      <a href="{{ post.url | relative_url }}" style="font-family: 'Dreamcast', sans-serif; font-size: 1.6rem; color: #e8560a; text-decoration: none; font-weight: bold;">{{ post.title }}</a>
    </li>
  {% endfor %}
</ul>
